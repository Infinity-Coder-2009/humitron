[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "humitron"
version = "0.2.0"
description = "Local-first AI Agent with ReAct loop, MCP integration, and memory"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Humitron Contributors", email = "contributors@humitron.dev"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.10"
dependencies = [
    "httpx==0.27.0",
    "pydantic==2.8.2",
    "pydantic-settings==2.3.4",
    "pyyaml==6.0.1",
    "python-dotenv==1.2.2",
    "rich==13.7.1",
    "loguru==0.7.2",
]

[project.optional-dependencies]
dev = [
    "pytest==8.2.2",
    "pytest-mock==3.14.0",
    "pytest-asyncio==0.23.3",
    "black==24.4.2",
    "ruff==0.4.4",
    "mypy==1.10.0",
    "types-requests==2.31.0",
]

[project.urls]
Homepage = "https://github.com/humitron/humitron"
Repository = "https://github.com/humitron/humitron"
Issues = "https://github.com/humitron/humitron/issues"

[tool.setuptools.packages.find]
where = ["src"]
include = ["humitron*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers --tb=short"
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
]

[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.venv
  | \.git
  | __pycache__
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py310"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "T20", # flake8-print
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # function call in default argument
]
exclude = [
    ".venv",
    ".git",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_optional = true
show_error_codes = true
pretty = true
namespace_packages = true
explicit_package_bases = true